<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modo TV - Control de Calidad</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: #f8fafc; overflow: hidden; }
        header { background: #1e3c72; color: white; padding: 8px 20px; text-align: center; font-size: 20px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; }
        .logo { height: 30px; }
        
        .main { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 10px; padding: 10px; height: calc(100vh - 50px); box-sizing: border-box; }
        .panel { background: #1e293b; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; min-height: 0; border: 1px solid #334155; }
        
        .chart-title { font-size: 18px; color: #60a5fa; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .chart-container { flex: 1; min-height: 0; background: #0f172a; border-radius: 8px; padding: 5px; }
        
        .sidebar { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
        .resumen-box { flex: 1; min-height: 0; overflow: hidden; }
        .resumen-title { font-size: 14px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        
        .resumen-lista { display: flex; flex-direction: column; gap: 4px; height: 100%; }
        
        .fila-comparativa { 
            display: grid; 
            grid-template-columns: 0.5fr 1fr 1fr; 
            align-items: center; 
            border-radius: 6px; 
            padding: 6px 10px; 
            background: #334155;
            transition: all 0.3s;
        }

        .item-label { font-size: 9px; color: #cbd5e1; text-transform: uppercase; }
        .col-calibre { font-size: 18px; font-weight: 900; color: #ffffff; }
        .val-prom { font-size: 16px; font-weight: 600; color: #94a3b8; }
        .val-ult { font-size: 19px; font-weight: 800; display: flex; align-items: center; gap: 5px; }
        
        /* ESTADOS VISUALES */
        .status-ok { color: #4ade80; }      /* Verde: Correcto ✔ */
        .status-bajo { color: #f87171; }    /* Rojo: Bajo peso ▼ */
        .status-sobre { color: #fbbf24; }   /* Amarillo/Naranja: Sobre peso ▲ */
        
        .alerta-critica { background: #450a0a; border: 1px solid #f87171; }
    </style>
</head>
<body>
    <header>
        <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo">
        <span id="tituloHeader">MONITOREO DE PROCESO</span>
        <span id="estadoSync" style="font-size: 10px; color: #94a3b8;">--:--</span>
    </header>

    <div class="main">
        <div class="panel">
            <div class="chart-title" id="tituloExportadora">Cargando...</div>
            <div class="chart-container">
                <canvas id="graficoPesosTV"></canvas>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel resumen-box">
                <div class="resumen-title">COMPARATIVO DE ÚLTIMO PESO</div>
                <div class="resumen-lista" id="resumenCalibres"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkKbW5dlOgY66tCeAHVo4Ceqlsn5aH6Thkticjhw8RfUhXtdI4wscqfliLFmlkLXIp/exec";
        let graficoTV = null;
        let cargando = false;

        function normalizarNumero(v) {
            if (!v) return NaN;
            return parseFloat(String(v).trim().replace(",", "."));
        }

        async function refrescarPantalla() {
            if (cargando) return;
            cargando = true;
            try {
                const response = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                const hoy = new Date().toISOString().split('T')[0];
                
                const registrosHoy = data.filter(r => r[0] && new Date(r[0]).toISOString().split('T')[0] === hoy);
                if (registrosHoy.length === 0) return;

                const ultimo = registrosHoy[registrosHoy.length - 1];
                const exp = ultimo[3], varNombre = ultimo[7];
                document.getElementById("tituloExportadora").innerText = `${exp} | ${varNombre}`;

                const filtrados = registrosHoy.filter(r => r[3] === exp && r[7] === varNombre);
                const resumen = {}, ultimos = {};

                filtrados.forEach(r => {
                    const c = String(r[5]).trim(), p = normalizarNumero(r[9]);
                    if (!isNaN(p)) {
                        if(!resumen[c]) resumen[c] = [];
                        resumen[c].push(p);
                        ultimos[c] = p;
                    }
                });

                const cals = Object.keys(resumen).sort((a,b) => parseInt(a)-parseInt(b));

                document.getElementById("resumenCalibres").innerHTML = cals.map(c => {
                    const p = resumen[c];
                    const prom = p.reduce((a,b) => a+b, 0) / p.length;
                    const ult = ultimos[c];
                    
                    let icon = "✔", clase = "status-ok", alerta = "";
                    
                    // Lógica solicitada:
                    if (ult < prom - 0.1) { 
                        // Bajo peso: Flecha Roja Abajo
                        icon = "▼"; 
                        clase = "status-bajo"; 
                        alerta = "alerta-critica";
                    } else if (ult > prom + 0.1) {
                        // Sobre peso: Flecha Amarilla Arriba
                        icon = "▲"; 
                        clase = "status-sobre";
                    }

                    return `
                    <div class="fila-comparativa ${alerta}">
                        <div class="col-calibre">C${c}</div>
                        <div>
                            <div class="item-label">Prom.</div>
                            <div class="val-prom">${prom.toFixed(2)}</div>
                        </div>
                        <div class="val-ult ${clase}">
                            ${ult.toFixed(2)} <span>${icon}</span>
                        </div>
                    </div>`;
                }).join("");

                actualizarGrafico(filtrados, exp, varNombre);
                document.getElementById("estadoSync").innerText = "Act: " + new Date().toLocaleTimeString();
            } catch (e) { console.error(e); } finally { cargando = false; }
        }

        function actualizarGrafico(regs, exp, v) {
            const ctx = document.getElementById("graficoPesosTV").getContext("2d");
            const grupos = {};
            regs.forEach(r => {
                const c = String(r[5]).trim(), p = normalizarNumero(r[9]);
                if (!grupos[c]) grupos[c] = [];
                grupos[c].push(p);
            });

            const datasets = Object.keys(grupos).sort((a,b)=>parseInt(a)-parseInt(b)).map((c, i) => ({
                label: `C${c}`, 
                data: grupos[c], 
                borderColor: `hsl(${i * 55}, 70%, 60%)`,
                tension: 0.3, pointRadius: 3, borderWidth: 2
            }));

            if (graficoTV) graficoTV.destroy();
            graficoTV = new Chart(ctx, {
                type: 'line',
                data: { labels: Array.from({length: 25}, (_,i)=>i+1), datasets },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { grid: {color: '#334155'}, ticks: {color: '#94a3b8', font: {size: 11}} }, 
                        x: { display: false } 
                    },
                    plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc', boxWidth: 12, font: {size: 10} } } }
                }
            });
        }

        setInterval(refrescarPantalla, 3000);
        window.onload = refrescarPantalla;
    </script>
</body>
</html>
