<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modo TV - Registro de Pesos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Segoe UI, sans-serif; margin: 0; background: #f4f6f9; color: #1f2937; }
        header { background: #1e3c72; color: white; padding: 18px 24px; text-align: center; font-size: 28px; font-weight: 600; position: relative; }
        .logo { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 46px; }
        .codigo-empresa { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 14px; font-weight: 500; }
        .main { display: grid; grid-template-columns: 2.3fr 0.9fr; gap: 20px; padding: 20px; height: calc(100vh - 96px); box-sizing: border-box; }
        .panel { background: white; border-radius: 16px; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08); padding: 18px; overflow: hidden; }
        .chart-panel { display: flex; flex-direction: column; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; }
        .chart-title { font-size: 24px; font-weight: 700; }
        .chart-subinfo { font-size: 13px; color: #6b7280; text-align: right; }
        .chart-container { position: relative; flex: 1; min-height: 0; }
        .sidebar { display: grid; grid-template-rows: auto auto 1fr; gap: 16px; min-height: 0; }
        .mini-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .kpi { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px; }
        .kpi-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
        .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; color: #1e3c72; }
        .objetivos-box { background: #fffbeb; border: 1px solid #fef3c7; border-radius: 14px; padding: 14px; }
        .objetivos-title { font-size: 14px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
        .objetivos-texto { font-size: 13px; color: #b45309; font-weight: 500; line-height: 1.45; }
        .resumen-box { min-height: 0; display: flex; flex-direction: column; }
        .resumen-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .resumen-lista { overflow: auto; padding-right: 4px; }
        .fila-simple { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: center; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; background: #fafafa; }
        .fila-calibre { font-size: 18px; font-weight: 700; color: #1e3c72; }
        .fila-promedio { font-size: 18px; font-weight: 700; text-align: right; color: #059669; }
        .sin-datos { color: #6b7280; font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>
    <header>
        <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
        MODO TV - MONITOREO EN VIVO
        <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="main">
        <div class="panel chart-panel">
            <div class="chart-header">
                <div class="chart-title" id="tituloExportadora">Cargando datos...</div>
                <div class="chart-subinfo">
                    <div id="fechaHoy"></div>
                    <div id="estadoSync">Sincronizando...</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="graficoPesosTV"></canvas>
            </div>
        </div>

        <div class="sidebar">
            <div class="mini-kpis">
                <div class="kpi">
                    <div class="kpi-label">Cajas Controladas</div>
                    <div class="kpi-value" id="kpiCajas">0</div>
                </div>
                <div class="kpi">
                    <div class="kpi-label">Calibres en Línea</div>
                    <div class="kpi-value" id="kpiCalibres">0</div>
                </div>
            </div>

            <div class="objetivos-box">
                <div class="objetivos-title">Límites de Peso (Objetivos)</div>
                <div class="objetivos-texto" id="infoObjetivosTV">Cargando objetivos...</div>
            </div>

            <div class="panel resumen-box">
                <div class="resumen-title">Promedios Reales</div>
                <div class="resumen-lista" id="resumenCalibres"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";
        let graficoTV = null;
        let cargando = false;
        let reglasObjetivo = [];

        function normalizarNumero(valor) {
            if (valor === null || valor === undefined) return NaN;
            const limpio = String(valor).trim().replace(",", ".");
            return parseFloat(limpio);
        }

        function formatDate(date) {
            if (date instanceof Date) {
                const day = String(date.getDate()).padStart(2, "0");
                const month = String(date.getMonth() + 1).padStart(2, "0");
                const year = date.getFullYear();
                return `${year}-${month}-${day}`;
            }
            if (typeof date === "string" && date.includes("/")) {
                const parts = date.split("/");
                return `${parts[2]}-${parts[1].padStart(2, "0")}-${parts[0].padStart(2, "0")}`;
            }
            return date;
        }

        function cargarObjetivosDesdeServidor() {
            return fetch(SCRIPT_URL + "?tipo=objetivos&t=" + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data)) return;
                    reglasObjetivo = data.slice(1).map(r => ({
                        desde: parseInt(r[0]), hasta: parseInt(r[1]), objetivo: normalizarNumero(r[2])
                    })).filter(r => !isNaN(r.objetivo));
                });
        }

        function obtenerObjetivoPorCalibre(calibre) {
            const cNum = parseInt(calibre);
            const regla = reglasObjetivo.find(r => cNum >= r.desde && cNum <= r.hasta);
            return regla ? regla.objetivo : null;
        }

        function generarColor(index) {
            const colores = ["#1e3c72", "#4caf50", "#ff9800", "#e91e63", "#009688", "#f44336", "#3f51b5", "#8bc34a"];
            return colores[index % colores.length];
        }

        function actualizarGraficoTV(registros) {
            const canvas = document.getElementById("graficoPesosTV");
            const ctx = canvas.getContext("2d");

            if (!registros || registros.length === 0) return;

            // Sincronización automática: Tomar la exportadora del último registro
            const ultimaExportadora = String(registros[registros.length - 1][3]).trim();
            document.getElementById("tituloExportadora").innerText = "Exportadora: " + ultimaExportadora;

            const filtrados = registros.filter(row => String(row[3]).trim() === ultimaExportadora);
            const grupos = {};

            filtrados.forEach(row => {
                const cal = String(row[5]).trim();
                const peso = normalizarNumero(row[9]);
                if (!cal || isNaN(peso)) return;
                if (!grupos[cal]) grupos[cal] = [];
                grupos[cal].push(peso);
            });

            const maxCajas = Math.max(...Object.values(grupos).map(a => a.length), 0);
            const labels = Array.from({ length: maxCajas }, (_, i) => `Caja ${i + 1}`);
            const calibresUnicos = Object.keys(grupos).sort((a, b) => parseInt(a) - parseInt(b));
            
            const datasets = [];
            calibresUnicos.forEach((cal, index) => {
                const color = generarColor(index);
                const obj = obtenerObjetivoPorCalibre(cal);
                
                // Línea Real
                datasets.push({
                    label: `C${cal} Real`, data: grupos[cal], borderColor: color, backgroundColor: color, tension: 0.3, fill: false, pointRadius: 5
                });

                // Línea Objetivo (Punteada)
                if (obj !== null) {
                    datasets.push({
                        label: `C${cal} Obj (${obj.toFixed(2)})`,
                        data: Array(grupos[cal].length).fill(obj),
                        borderColor: color, borderDash: [10, 5], pointRadius: 0, borderWidth: 2, fill: false
                    });
                }
            });

            if (graficoTV) graficoTV.destroy();
            graficoTV = new Chart(ctx, {
                type: "line",
                data: { labels, datasets },
                options: { 
                    responsive: true, maintainAspectRatio: false, animation: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function cargarDatosTV() {
            if (cargando) return;
            cargando = true;

            Promise.all([
                fetch(SCRIPT_URL + "?t=" + new Date().getTime()).then(res => res.json()),
                cargarObjetivosDesdeServidor()
            ]).then(([data]) => {
                const hoy = formatDate(new Date());
                const registrosHoy = data.filter(row => row[0] && formatDate(row[0]) === hoy);
                
                // KPIs y Resumen
                const resumen = {};
                registrosHoy.forEach(r => {
                    const c = String(r[5]).trim(); const p = normalizarNumero(r[9]);
                    if (!resumen[c]) resumen[c] = []; resumen[c].push(p);
                });

                const calList = Object.keys(resumen).sort((a, b) => parseInt(a) - parseInt(b));
                document.getElementById("kpiCajas").innerText = registrosHoy.length;
                document.getElementById("kpiCalibres").innerText = calList.length;
                document.getElementById("fechaHoy").innerText = new Date().toLocaleDateString("es-CL");

                const listaHtml = calList.map(c => {
                    const prom = resumen[c].reduce((a,b) => a+b, 0) / resumen[c].length;
                    return `<div class="fila-simple"><div class="fila-calibre">Calibre ${c}</div><div class="fila-promedio">${prom.toFixed(2)} kg</div></div>`;
                }).join("");
                document.getElementById("resumenCalibres").innerHTML = listaHtml || "Sin datos";

                // Objetivos Texto
                document.getElementById("infoObjetivosTV").innerHTML = reglasObjetivo.length > 0 
                    ? reglasObjetivo.map(r => `C${r.desde}-${r.hasta}: <b>${r.objetivo.toFixed(2)}kg</b>`).join(" | ")
                    : "Sin objetivos cargados";

                actualizarGraficoTV(registrosHoy);
                document.getElementById("estadoSync").innerText = "Actualizado: " + new Date().toLocaleTimeString();
            }).finally(() => { cargando = false; });
        }

        setInterval(cargarDatosTV, 3000);
        window.onload = cargarDatosTV;
    </script>
</body>
</html>
