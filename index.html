<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Registro de Pesos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Segoe UI, sans-serif;
        margin: 0;
        background: #f4f6f9;
      }

      header {
        background: #1e3c72;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        position: relative;
      }

      .logo {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        height: 50px;
      }

      .codigo-empresa {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 500;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }

      button {
        background: #2a5298;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #1e3c72;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        background: #2a5298;
        color: white;
        padding: 6px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #eee;
      }

      .success {
        color: green;
        font-weight: bold;
      }

      .hidden {
        display: none;
      }

      .chart-container {
        position: relative;
        width: 100%;
        height: 420px;
      }

      .estado-sync {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>

  <body>
    <header>
      <img src="https://raw.githubusercontent.com/eduardoletelier1116-blip/app-pesaje-manzana/main/fondo-blanco.jpg" class="logo" alt="Fresh-Pak">
      Registro de Pesos
      <div class="codigo-empresa">R02 POE 29</div>
    </header>

    <div class="container">
      <div class="card" id="loginCard">
        <h3>Ingreso</h3>
        <input type="text" id="nombreOperador" placeholder="Nombre operador">
        <input type="password" id="claveOperador" placeholder="Clave operador">
        <button onclick="ingresarOperador()">Operador</button>
        <p id="msgLogin" style="color:red;"></p>
      </div>

      <div class="card hidden" id="formCard">
        <h3>Nuevo Registro</h3>
        <form id="form">
          <input type="text" id="operador" readonly>

          <select id="exportadora" required>
            <option value="">Exportadora</option>
            <option>Fruclem</option>
            <option>SK Gyan</option>
            <option>JHB</option>
            <option>Talamaya</option>
          </select>

          <select id="categoria" required>
            <option value="">Categoría</option>
            <option>Premium</option>
            <option>Extra</option>
            <option>Fancy</option>
            <option>Choice</option>
            <option>Granel</option>
            <option>CEM</option>
          </select>

          <select id="variedad" required>
            <option value="">Variedad</option>
            <option>Royal Gala</option>
            <option>Red Delicious</option>
            <option>Granny</option>
            <option>Fuji</option>
            <option>Pink Lady</option>
          </select>

          <select id="salida" required>
            <option value="">Salida</option>
          </select>

          <input type="text" id="calibre" placeholder="Calibre" required>
          <input type="text" id="lote" placeholder="Lote">
          <input type="number" step="0.01" id="peso" placeholder="Peso (kg)" required>

          <button type="submit">Guardar</button>
          <p id="msg" class="success"></p>
        </form>
      </div>

      <div class="card" id="registrosCard">
        <h3>Registros</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Usuario</th>
              <th>Exportadora</th>
              <th>Salida</th>
              <th>Calibre</th>
              <th>Categoría</th>
              <th>Variedad</th>
              <th>Lote</th>
              <th>Peso</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
        <div class="estado-sync" id="estadoSync">Sincronizando...</div>
      </div>

      <div class="card" id="graficoCard">
        <h3>Seguimiento de pesos por calibre</h3>
        <div class="chart-container">
          <canvas id="graficoPesos"></canvas>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEWxdRCwj549evEfZ47u6m2uDKj08gAvKN5zlUd67axC9kbmOVrx-Xd3O7hCggPErL/exec";
      const salidaSelect = document.getElementById("salida");
      const estadoSync = document.getElementById("estadoSync");
      let grafico = null;
      let autoRefresh = null;
      let cargando = false;

      for (let i = 1; i <= 41; i++) {
        let option = document.createElement("option");
        option.value = i;
        option.text = i;
        salidaSelect.appendChild(option);
      }

      let operadorData = {
        operador: "",
        exportadora: "",
        variedad: "",
        lote: ""
      };

      function formatDate(date) {
        if (date instanceof Date) {
          const day = String(date.getDate()).padStart(2, "0");
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const year = date.getFullYear();
          return `${year}-${month}-${day}`;
        }

        if (typeof date === "string" && date.includes("/")) {
          const parts = date.split("/");
          if (parts.length === 3) {
            const day = String(parts[0]).padStart(2, "0");
            const month = String(parts[1]).padStart(2, "0");
            const year = parts[2];
            return `${year}-${month}-${day}`;
          }
        }

        return date;
      }

      function filtrarRegistrosPorDia(registros) {
        const hoy = new Date();
        const fechaHoy = formatDate(hoy);

        return registros.filter(row => {
          if (!row || row.length < 10) return false;

          const fechaOriginal = row[0];
          if (String(fechaOriginal).toLowerCase() === "fecha") return false;

          const fechaRegistro = formatDate(fechaOriginal);
          return fechaRegistro === fechaHoy;
        });
      }

      function generarColor(index) {
        const colores = [
          "#1e3c72",
          "#2a5298",
          "#4caf50",
          "#ff9800",
          "#e91e63",
          "#9c27b0",
          "#009688",
          "#f44336",
          "#795548",
          "#607d8b",
          "#3f51b5",
          "#8bc34a",
          "#ffc107",
          "#673ab7",
          "#00bcd4"
        ];
        return colores[index % colores.length];
      }

      function actualizarTabla(registros) {
        const tbody = document.getElementById("tabla");
        tbody.innerHTML = "";

        if (!registros || registros.length === 0) {
          tbody.innerHTML = `<tr><td colspan="10">No hay registros para hoy.</td></tr>`;
          return;
        }

        [...registros].reverse().forEach(row => {
          tbody.innerHTML += `
            <tr>
              <td>${row[0]}</td>
              <td>${row[1]}</td>
              <td>${row[2]}</td>
              <td>${row[3]}</td>
              <td>${row[4]}</td>
              <td>${row[5]}</td>
              <td>${row[6]}</td>
              <td>${row[7]}</td>
              <td>${row[8]}</td>
              <td>${row[9]}</td>
            </tr>
          `;
        });
      }

      function actualizarGrafico(registros) {
        const canvas = document.getElementById("graficoPesos");
        const ctx = canvas.getContext("2d");

        if (!registros || registros.length === 0) {
          if (grafico) {
            grafico.destroy();
            grafico = null;
          }
          return;
        }

        const gruposPorCalibre = {};

        registros.forEach(row => {
          const calibre = String(row[5]).trim();
          const peso = parseFloat(String(row[9]).replace(",", "."));

          if (!calibre || isNaN(peso)) return;

          if (!gruposPorCalibre[calibre]) {
            gruposPorCalibre[calibre] = [];
          }

          gruposPorCalibre[calibre].push(peso);
        });

        const maxCajas = Math.max(
          ...Object.values(gruposPorCalibre).map(arr => arr.length),
          0
        );

        const labels = Array.from({ length: maxCajas }, (_, i) => `Caja ${i + 1}`);

        const calibresUnicos = Object.keys(gruposPorCalibre);

        const datasets = calibresUnicos.map((calibre, index) => {
          return {
            label: `Calibre ${calibre}`,
            data: gruposPorCalibre[calibre],
            borderColor: generarColor(index),
            backgroundColor: generarColor(index),
            tension: 0.25,
            fill: false,
            pointRadius: 4,
            pointHoverRadius: 6,
            spanGaps: false
          };
        });

        if (grafico) {
          grafico.destroy();
        }

        grafico = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: {
              mode: "nearest",
              intersect: false
            },
            plugins: {
              legend: {
                position: "top"
              },
              tooltip: {
                callbacks: {
                  title: function(context) {
                    return context[0].label;
                  },
                  label: function(context) {
                    return `${context.dataset.label}: ${context.raw} kg`;
                  }
                }
              }
            },
            scales: {
              x: {
                title: {
                  display: true,
                  text: "Número de caja por calibre"
                }
              },
              y: {
                beginAtZero: false,
                title: {
                  display: true,
                  text: "Peso (kg)"
                }
              }
            }
          }
        });
      }

      function cargarRegistros() {
        if (cargando) return;
        cargando = true;

        fetch(SCRIPT_URL + "?t=" + new Date().getTime())
          .then(res => res.json())
          .then(data => {
            const registrosFiltrados = filtrarRegistrosPorDia(data);
            actualizarTabla(registrosFiltrados);
            actualizarGrafico(registrosFiltrados);

            const ahora = new Date();
            estadoSync.innerText = "Última actualización: " + ahora.toLocaleTimeString("es-CL");
          })
          .catch(err => {
            console.error("Error cargando registros:", err);
            estadoSync.innerText = "Error al sincronizar";
          })
          .finally(() => {
            cargando = false;
          });
      }

      function iniciarAutoRefresh() {
        if (autoRefresh) clearInterval(autoRefresh);
        autoRefresh = setInterval(cargarRegistros, 3000);
      }

      window.addEventListener("load", function () {
        const exportadora = localStorage.getItem("exportadora");
        const variedad = localStorage.getItem("variedad");
        const lote = localStorage.getItem("lote");

        if (exportadora) document.getElementById("exportadora").value = exportadora;
        if (variedad) document.getElementById("variedad").value = variedad;
        if (lote) document.getElementById("lote").value = lote;

        cargarRegistros();
        iniciarAutoRefresh();
      });

      function ingresarOperador() {
        const nombre = document.getElementById("nombreOperador").value.trim();
        const clave = document.getElementById("claveOperador").value.trim();

        if (!nombre || !clave) {
          document.getElementById("msgLogin").innerText = "Ingrese nombre y clave";
          return;
        }

        if (clave === "fresh") {
          operadorData.operador = nombre;
          document.getElementById("operador").value = operadorData.operador;

          document.getElementById("loginCard").classList.add("hidden");
          document.getElementById("registrosCard").classList.remove("hidden");
          document.getElementById("formCard").classList.remove("hidden");
          document.getElementById("salida").focus();

          cargarRegistros();
        } else {
          document.getElementById("msgLogin").innerText = "Clave incorrecta";
        }
      }

      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();

        const data = {
          operador: operadorData.operador,
          exportadora: document.getElementById("exportadora").value,
          salida: document.getElementById("salida").value,
          calibre: document.getElementById("calibre").value,
          categoria: document.getElementById("categoria").value,
          variedad: document.getElementById("variedad").value,
          lote: document.getElementById("lote").value,
          peso: document.getElementById("peso").value
        };

        fetch(SCRIPT_URL, {
          method: "POST",
          body: new URLSearchParams(data)
        })
          .then(res => res.json())
          .then(() => {
            document.getElementById("msg").innerText = "Guardado correctamente";

            localStorage.setItem("exportadora", data.exportadora);
            localStorage.setItem("variedad", data.variedad);
            localStorage.setItem("lote", data.lote);

            document.getElementById("calibre").value = "";
            document.getElementById("peso").value = "";
            document.getElementById("categoria").value = "";
            document.getElementById("salida").value = "";
            document.getElementById("operador").value = operadorData.operador;

            document.getElementById("salida").focus();

            setTimeout(() => {
              document.getElementById("msg").innerText = "";
            }, 1500);

            cargarRegistros();
          })
          .catch(err => {
            console.error("Error guardando:", err);
            document.getElementById("msg").innerText = "Error al guardar";
          });
      });
    </script>
  </body>
</html>
